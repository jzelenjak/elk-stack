input {
    file {
        path => "/usr/share/logstash/ingest-data/logs/*"
        start_position => "beginning"
    }
}

filter {
    grok {
        match => {
            "message" => [
                '%{TIMESTAMP_ISO8601:time} %{LOGLEVEL:logLevel} %{GREEDYDATA:logMessage}',
                '%{IP:clientIP} %{WORD:httpMethod} %{URIPATH:url}'
            ]
        }
    }
}

output {
    elasticsearch {
        hosts => "${ELASTIC_HOSTS}"
        user => "${ELASTIC_USER}"
        password => "${ELASTIC_PASSWORD}"
        ssl_enabled => true
        ssl_certificate_authorities => "${SSL_CERTIFICATEAUTHORITIES}"
        index => "logs"
    }
    stdout {}
}
