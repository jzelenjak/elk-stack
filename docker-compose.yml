# Single-node Elasticsearch cluster with Kibana, Logstash, and Filebeat
# Resources:
# - https://www.elastic.co/blog/getting-started-with-the-elastic-stack-and-docker-compose
# - https://www.elastic.co/docs/deploy-manage/deploy/self-managed/install-elasticsearch-docker-basic
# - https://www.elastic.co/docs/deploy-manage/deploy/self-managed/install-elasticsearch-docker-compose
# - https://www.elastic.co/docs/deploy-manage/deploy/self-managed/install-kibana-with-docker
# - https://github.com/elastic/elasticsearch/tree/main/docs/reference/setup/install/docker

services:
  setup:
    container_name: elastic_setup
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    user: "0"
    command: /usr/share/elasticsearch/docker_elastic_setup.sh
    volumes:
      - ./docker_elastic_setup.sh:/usr/share/elasticsearch/docker_elastic_setup.sh
      - ./instances.yml:/usr/share/elasticsearch/config/certs/instances.yml
      - certs:/usr/share/elasticsearch/config/certs
      - ca_certs:/usr/share/elasticsearch/config/ca_certs
      - es01_certs:/usr/share/elasticsearch/config/certs/es01
      - kibana_certs:/usr/share/elasticsearch/config/certs/kibana
    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - KIBANA_PASSWORD=${KIBANA_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "[ -f config/certs/es01/es01.crt ] && [ -f config/ca_certs/ca.crt ]"]
      start_period: 5s
      interval: 1s
      timeout: 5s
      retries: 120

  es01:
    container_name: es01
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    restart: unless-stopped
    volumes:
      - ./elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
      - ca_certs:/usr/share/elasticsearch/config/certs/ca
      - es01_certs:/usr/share/elasticsearch/config/certs/es01
      - es01_data:/usr/share/elasticsearch/data
    environment:
      - NODE_NAME=es01
      - CLUSTER_NAME=${CLUSTER_NAME} 
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - LICENSE=${LICENSE}
    ports:
      - ${ES_PORT}:9200
    networks:
      - internal
    mem_limit: ${ES_MEM_LIMIT}
    # NOTE: With Docker in rootless mode, container cannot have unlimited locked-in-memory address space
    # Therefore, memlock with -1:-1 is not possible (see https://github.com/elastic/start-local/issues/66)
    # Check rootless mode with: docker info --format '{{ .SecurityOptions }}' 2>/dev/null
    #ulimits:
      #memlock:
      #  soft: -1
      #  hard: -1
    healthcheck:
      test:
        ["CMD-SHELL", "curl -s --cacert config/certs/ca/ca.crt https://localhost:9200 | grep -q 'missing authentication credentials'"]
      interval: 10s
      timeout: 30s
      retries: 120
    depends_on:
      setup:
        condition: service_healthy
    labels:
      co.elastic.logs/module: elasticsearch

  kibana:
    container_name: kibana
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION}
    restart: unless-stopped
    volumes:
      - ./kibana.yml:/usr/share/kibana/config/kibana.yml
      - ca_certs:/usr/share/kibana/config/certs/ca
      - kibana_certs:/usr/share/kibana/config/certs/kibana
      - kibana_data:/usr/share/kibana/data
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=https://es01:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - KIBANA_ENCRYPTED_SAVED_OBJECTS_ENCRYPTION_KEY=${KIBANA_ENCRYPTED_SAVED_OBJECTS_ENCRYPTION_KEY}
      - KIBANA_REPORTING_ENCRYPTION_KEY=${KIBANA_REPORTING_ENCRYPTION_KEY}
      - KIBANA_SECURITY_ENCRYPTION_KEY=${KIBANA_SECURITY_ENCRYPTION_KEY}
    ports:
      - ${KIBANA_PORT}:5601
    networks:
      - internal
    mem_limit: ${KB_MEM_LIMIT}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --cacert config/certs/ca/ca.crt https://localhost:5601/"]
      interval: 10s
      timeout: 10s
      retries: 120
    depends_on:
      es01:
        condition: service_healthy
    labels:
      co.elastic.logs/module: kibana

  logstash:
    container_name: logstash
    image: docker.elastic.co/logstash/logstash:${STACK_VERSION}
    # INFO: You can specify which pipeline to run with a -f option
    # In that case, Logstash will ignore the pipelines.yml file
    # When you start Logstash without arguments, it will read the pipelines.yml file and instantiate all pipelines specified in the file
    # command: /usr/share/logstash/bin/logstash -f /usr/share/logstash/pipeline/logstash-apache.conf
    # INFO: Test logstash pipeline configuration
    # command: /usr/share/logstash/bin/logstash -f /usr/share/logstash/pipeline/logstash-json.conf --config.test_and_exit
    volumes:
      - ./logstash-pipelines:/usr/share/logstash/pipeline
      - ./logstash-pipelines.yml:/usr/share/logstash/config/pipelines.yml
      - ./logstash-ingest-data:/usr/share/logstash/ingest-data
      - ca_certs:/usr/share/logstash/config/certs/ca
      - logstash_data:/usr/share/logstash/data
    environment:
      - ELASTIC_HOSTS=https://es01:9200
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - SSL_CERTIFICATEAUTHORITIES=/usr/share/logstash/config/certs/ca/ca.crt
    networks:
      - internal
    mem_limit: ${LS_MEM_LIMIT}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9600/ > /dev/null"]
      interval: 10s
      timeout: 10s
      retries: 120
    depends_on:
      es01:
        condition: service_healthy
      kibana:
        condition: service_healthy
    labels:
      co.elastic.logs/module: logstash

  filebeat:
    container_name: filebeat
    image: docker.elastic.co/beats/filebeat:${STACK_VERSION}
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./filebeat-ingest-data:/usr/share/filebeat/ingest-data:ro
      - ca_certs:/usr/share/filebeat/certs
      - filebeat_data:/usr/share/filebeat/data
      # INFO: Rootless mode:
      #- "$HOME/.local/share/docker/containers:/var/lib/docker/containers:ro"
      #- "$XDG_RUNTIME_DIR/docker.sock:/var/run/docker.sock:ro"
      # INFO: Non-rootless mode:
      #- /var/lib/docker/containers:/var/lib/docker/containers:ro
      #- /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - ELASTIC_USER=elastic
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - ELASTIC_HOSTS=https://es01:9200
      - KIBANA_HOSTS=https://kibana:5601
      - LOGSTASH_HOSTS=http://logstash:9600
      - SSL_CERTIFICATEAUTHORITIES=/usr/share/filebeat/certs/ca.crt
    networks:
      - internal
    depends_on:
      es01:
        condition: service_healthy
      kibana:
        condition: service_healthy
    labels:
      co.elastic.logs/module: filebeat

volumes:
  certs:
    driver: local
  ca_certs:
    driver: local
  es01_certs:
    driver: local
  kibana_certs:
    driver: local
  es01_data:
    driver: local
  kibana_data:
    driver: local
  logstash_data:
    driver: local
  filebeat_data:
    driver: local

networks:
  internal:
    driver: bridge
    ipam:
      config:
        - subnet: ${ES_SUBNET}
    driver_opts:
      com.docker.network.bridge.name: "elastic_net"
