# Elasticsearch configuration file.
# For more information, see the documentation:
# - https://www.elastic.co/docs/deploy-manage/deploy/self-managed/configure-elasticsearch

network.host: 0.0.0.0
node.name: ${NODE_NAME}
cluster.name: ${CLUSTER_NAME}
discovery.type: single-node

# INFO: When using rootless docker mode
bootstrap.memory_lock: false
# INFO: When using non-rootless docker mode
# bootstrap.memory_lock: true

xpack.security.enabled: true
xpack.security.http.ssl.enabled: true
xpack.security.http.ssl.key: /usr/share/elasticsearch/config/certs/${NODE_NAME}/${NODE_NAME}.key
xpack.security.http.ssl.certificate: /usr/share/elasticsearch/config/certs/${NODE_NAME}/${NODE_NAME}.crt
xpack.security.http.ssl.certificate_authorities: /usr/share/elasticsearch/config/certs/ca/ca.crt
xpack.security.transport.ssl.enabled: true
xpack.security.transport.ssl.key: /usr/share/elasticsearch/config/certs/${NODE_NAME}/${NODE_NAME}.key
xpack.security.transport.ssl.certificate: /usr/share/elasticsearch/config/certs/${NODE_NAME}/${NODE_NAME}.crt
xpack.security.transport.ssl.certificate_authorities: /usr/share/elasticsearch/config/certs/ca/ca.crt
xpack.security.transport.ssl.verification_mode: certificate
xpack.license.self_generated.type: ${LICENSE}
xpack.ml.use_auto_machine_memory_percent: true
